<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NS Player</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
html,body{
margin:0;
padding:0;
background:#000;
height:100%;
overflow:hidden;
}

video{
width:100%;
height:100%;
background:#000;
}
</style>

</head>
<body>

<video id="video" controls autoplay></video>

<script>

const WORKER="https://young-river-6627.mhdmurad78.workers.dev";

const id=new URLSearchParams(location.search).get("id");

const url=WORKER+"/play?id="+id;

const video=document.getElementById("video");

if(Hls.isSupported()){

const hls=new Hls();

hls.loadSource(url);

hls.attachMedia(video);

}else{

video.src=url;

}

</script>

</body>
</html>
